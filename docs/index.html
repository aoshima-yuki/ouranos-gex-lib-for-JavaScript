<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>空間ID試行環境</title>
  <link rel="stylesheet" href="style.css" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <main class="container">

    <header class="header">
      <h1>空間ID試行環境</h1>
      <p class="sub">
        ズームレベル、標高、経度、緯度から z/f/x/y を計算し、空間IDを出力します。
      </p>
    </header>

    <!-- 入力 -->
    <section class="card">
      <h2 class="section-title">空間ID計算</h2>

      <form id="calc-form" class="stack">
        <input type="number" id="z" placeholder="ズームレベル" value="25" required />
        <input type="number" id="h" placeholder="標高(m)" value="0" required />
        <input type="number" id="lng" placeholder="経度" step="any" required />
        <input type="number" id="lat" placeholder="緯度" step="any" required />

        <button type="submit" class="btn">計算</button>
        <p id="msg" class="msg"></p>
      </form>
    </section>

    <!-- 結果 -->
    <section class="card">
      <h2 class="section-title">結果</h2>
      <code id="zfxy" class="zfxy-accent">-</code>
    </section>

    <!-- 逆変換 -->
    <section class="card">
      <h2 class="section-title">空間ID → 座標</h2>

      <form id="reverse-form" class="stack">
        <input id="space-id" placeholder="例: 25/22/18827764/14674339" required />
        <button type="submit" class="btn">変換</button>
      </form>

      <div class="out">
        <div>lng: <code id="reverse-lng">-</code></div>
        <div>lat: <code id="reverse-lat">-</code></div>
        <div>alt: <code id="reverse-alt">-</code></div>
      </div>
    </section>

    <!-- 地図 -->
    <section class="card">
      <h2 class="section-title">地図</h2>
      <div id="map" class="map"></div>
    </section>

  </main>

  <script src="./vendor/spatialid/index.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./app.js"></script>
</body>
</html>
