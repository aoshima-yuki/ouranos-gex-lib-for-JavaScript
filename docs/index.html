<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>空間ID試行環境</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <p class="hero-kicker">Spatial ID Demo</p>
      <h1>空間ID試行環境</h1>
      <p class="hero-sub">
        ズームレベル、標高、経度、緯度から <strong>z/f/x/y</strong> を計算し、空間IDを出力します。
      </p>
    </header>

    <div class="layout">
      <section class="panel">
        <div class="panel-head">
          <h2>空間ID計算</h2>
        </div>

        <form id="calc-form" class="form-grid">
          <label class="field">
            <span class="field-label">ズームレベル</span>
            <input type="number" id="z" value="15" required />
          </label>

          <label class="field">
            <span class="field-label">標高 (m)</span>
            <input type="number" id="h" value="1200" required />
          </label>

          <label class="field">
            <span class="field-label">経度 (度)</span>
            <input type="number" id="lng" value="139.7409559872962" step="any" required />
          </label>

          <label class="field">
            <span class="field-label">緯度 (度)</span>
            <input type="number" id="lat" value="35.672195798131135" step="any" required />
          </label>

          <div class="actions">
            <button type="submit" class="btn">計算</button>
          </div>

          <p id="msg" class="msg"></p>
        </form>
      </section>

      <section class="panel accent-panel">
        <div class="panel-head">
          <h2>空間ID</h2>
        </div>

        <div class="result-box">
          <code id="zfxy" class="zfxy-accent">-</code>
        </div>
      </section>
    </div>

    <section class="panel">
      <div class="panel-head">
        <h2>地図表示</h2>
      </div>
      <div id="map" class="map"></div>
    </section>
  </main>

  <script src="./vendor/spatialid/index.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./app.js"></script>
</body>
</html>
