<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>空間ID試行環境</title>
  <link rel="stylesheet" href="style.css" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />
</head>
<body>
  <main class="container">
    <header class="page-header">
      <div>
        <p class="eyebrow" data-i18n="eyebrow">Spatial ID Demo</p>
        <h1 data-i18n="pageTitle">空間ID試行環境</h1>
        <p class="lead" data-i18n="pageLead">
          位置情報から空間ID（z/f/x/y）を算出し、対象範囲を地図上で確認できます。
        </p>
      </div>

      <div class="lang-switch">
        <label for="lang-select" data-i18n="languageLabel">表示言語</label>
        <select id="lang-select" aria-label="language switcher">
          <option value="ja">日本語</option>
          <option value="en">English</option>
        </select>
      </div>
    </header>

    <section class="panel input-panel">
      <div class="panel-header">
        <h2 data-i18n="inputTitle">入力</h2>
        <p data-i18n="inputDesc">
          緯度・経度、必要に応じて標高、ズームレベルを入力します。
        </p>
      </div>

      <form id="calc-form" class="form-grid" novalidate>
        <label class="field">
          <span class="field-label" data-i18n="latLabel">緯度（度）</span>
          <input
            type="number"
            id="lat"
            step="any"
            min="-85.05112878"
            max="85.05112878"
            value="35.73004672351672"
            inputmode="decimal"
            required
          />
          <span class="field-note" data-i18n="latNote">-85.05112878 ～ 85.05112878</span>
        </label>

        <label class="field">
          <span class="field-label" data-i18n="lngLabel">経度（度）</span>
          <input
            type="number"
            id="lng"
            step="any"
            min="-180"
            max="180"
            value="139.7474538411047"
            inputmode="decimal"
            required
          />
          <span class="field-note" data-i18n="lngNote">-180 ～ 180</span>
        </label>

        <label class="field">
          <span class="field-label" data-i18n="altLabel">標高（m・任意）</span>
          <input
            type="number"
            id="h"
            step="any"
            min="0"
            max="33554432"
            placeholder="0"
            inputmode="decimal"
          />
          <span class="field-note" data-i18n="altNote">未入力の場合は 0m として計算</span>
        </label>

        <label class="field">
          <span class="field-label" data-i18n="zoomLabel">ズームレベル</span>
          <input
            type="number"
            id="z"
            step="1"
            min="0"
            max="35"
            value="15"
            inputmode="numeric"
            required
          />
          <span class="field-note" data-i18n="zoomNote">0 ～ 35 の整数</span>
        </label>

        <div class="actions">
          <button type="submit" class="btn-primary" data-i18n="calcButton">計算する</button>
          <p id="msg" class="message" aria-live="polite"></p>
        </div>
      </form>
    </section>

    <section class="panel result-panel">
      <div class="panel-header">
        <h2 data-i18n="resultTitle">出力</h2>
        <p data-i18n="resultDesc">
          算出された空間ID（z/f/x/y）を表示します。
        </p>
      </div>

      <div class="result-card">
        <div class="result-label" data-i18n="resultLabel">空間ID</div>
        <code id="zfxy" class="result-value">-</code>
      </div>
    </section>

    <section class="panel map-panel">
      <div class="panel-header">
        <h2 data-i18n="mapTitle">地図</h2>
        <p data-i18n="mapDesc">
          入力地点および対応する空間の範囲を表示します。
        </p>
      </div>
      <div id="map" class="map" aria-label="map"></div>
    </section>

    <section class="panel links-panel">
      <div class="panel-header">
        <h2 data-i18n="linksTitle">関連情報</h2>
      </div>
      <ul class="link-list">
        <li>
          <a
            href="https://www.ipa.go.jp/digital/architecture/guidelines/4dspatio-temporal-guideline.html"
            target="_blank"
            rel="noopener noreferrer"
            data-i18n="guidelineLink"
          >
            4次元時空間情報利活用のための空間IDガイドライン
          </a>
        </li>
        <li>
          <a
            href="https://github.com/ODS-IS-STID"
            target="_blank"
            rel="noopener noreferrer"
            data-i18n="repoLink"
          >
            Open Data Spaces 4次元時空間ID 関連リポジトリ
          </a>
        </li>
      </ul>
    </section>

    <footer class="footer-note" data-i18n="footerNote">
      本画面は試行環境です。表示結果は利用者の責任においてご確認ください。
    </footer>
  </main>

  <script src="./vendor/spatialid/index.js"></script>
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin=""
  ></script>
  <script src="./app.js"></script>
</body>
</html>
